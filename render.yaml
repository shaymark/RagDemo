services:
  - type: web
    name: aquabot-rag
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # Set this in the Render dashboard — never commit your API key
      - key: SESSION_SECRET_KEY
        sync: false   # Random secret for signing session cookies
      - key: ADMIN_USERNAME
        sync: false   # Admin login username (default: admin)
      - key: ADMIN_PASSWORD
        sync: false   # Admin login password (default: admin — CHANGE THIS)
      - key: PINECONE_API_KEY
        sync: false   # Required — get from console.pinecone.io
      - key: PINECONE_INDEX_NAME
        sync: false   # Optional — defaults to "aquabot-rag"
      - key: SUPABASE_URL
        sync: false   # Optional — enables cloud file persistence (e.g. https://xxx.supabase.co)
      - key: SUPABASE_KEY
        sync: false   # Optional — use service role key
      - key: SUPABASE_BUCKET
        sync: false   # Optional — defaults to "docs"
