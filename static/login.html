<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaBot RAG — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d2e;
      --surface2:  #22263a;
      --border:    #2e3250;
      --accent:    #7c6af7;
      --accent-h:  #9b8cff;
      --text:      #e2e4f0;
      --muted:     #8b90b0;
      --danger:    #e05c6a;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px;
      width: 360px;
    }

    .login-logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .login-logo span { color: var(--text); }

    .login-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: .4px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    input:focus { border-color: var(--accent); }

    .field { margin-bottom: 16px; }

    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    .btn-primary {
      width: 100%;
      padding: 10px 18px;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: 4px;
    }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">Aqua<span>Bot</span> RAG</div>
  <div class="login-subtitle">Admin Panel</div>

  <form id="login-form">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" required autofocus />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required />
    </div>
    <div id="login-error" class="error-msg"></div>
    <button type="submit" class="btn-primary">Sign In</button>
  </form>

  <a class="back-link" href="/">← Back to chat</a>
</div>

<script>
  const form = document.getElementById('login-form');
  const errorEl = document.getElementById('login-error');

  // If already authenticated, skip to admin
  fetch('/api/auth/status')
    .then(r => r.json())
    .then(d => { if (d.authenticated) window.location.href = '/admin'; });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.style.display = 'none';
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });

      if (res.ok) {
        window.location.href = '/admin';
      } else {
        const data = await res.json();
        errorEl.textContent = data.detail || 'Invalid credentials';
        errorEl.style.display = 'block';
        document.getElementById('password').value = '';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch (err) {
      errorEl.textContent = 'Network error. Please try again.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
