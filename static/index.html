<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaBot RAG Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d2e;
      --surface2:  #22263a;
      --border:    #2e3250;
      --accent:    #7c6af7;
      --accent-h:  #9b8cff;
      --text:      #e2e4f0;
      --muted:     #8b90b0;
      --danger:    #e05c6a;
      --success:   #4caf80;
      --user-bg:   #2d3158;
      --bot-bg:    #1e2235;
      --radius:    10px;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; }
    header .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
    header .logo span { color: var(--text); }
    nav { display: flex; gap: 4px; margin-left: auto; }
    nav button { background: none; border: none; color: var(--muted); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all .15s; }
    nav button:hover { background: var(--surface2); color: var(--text); }
    nav button.active { background: var(--accent); color: #fff; }

    /* ── Layout ── */
    main { max-width: 860px; margin: 32px auto; padding: 0 24px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 18px; color: var(--text); }

    /* ── Form elements ── */
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; letter-spacing: .4px; text-transform: uppercase; }
    input[type="text"], input[type="password"], input[type="number"], textarea, select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 10px 12px; font-size: 14px; outline: none; transition: border-color .15s;
      font-family: inherit;
    }
    input[type="text"]:focus, input[type="password"]:focus, input[type="number"]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 110px; line-height: 1.5; }
    input[type="number"] { width: 90px; }
    .field { margin-bottom: 16px; }
    .row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }

    /* ── Buttons ── */
    .btn { padding: 9px 18px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-danger  { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 5px 10px; font-size: 12px; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); }
    .btn-ghost:hover { background: var(--border); }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 999; max-width: 320px; }
    #toast.show { opacity: 1; }
    #toast.ok  { border-color: var(--success); color: var(--success); }
    #toast.err { border-color: var(--danger);  color: var(--danger); }

    /* ── Documents list ── */
    .doc-list { list-style: none; }
    .doc-item { display: flex; align-items: center; padding: 10px 12px; border-radius: 6px; background: var(--surface2); margin-bottom: 8px; gap: 10px; }
    .doc-item .doc-name { flex: 1; font-weight: 500; }
    .doc-item .doc-size { color: var(--muted); font-size: 12px; min-width: 60px; text-align: right; }
    .doc-icon { font-size: 18px; }
    .stat-bar { display: flex; gap: 20px; margin-top: 14px; }
    .stat { background: var(--surface2); border-radius: 6px; padding: 10px 16px; }
    .stat .val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 18px; text-align: center; color: var(--muted); cursor: pointer; transition: border-color .15s; margin-bottom: 16px; }
    .upload-area:hover, .upload-area.drag { border-color: var(--accent); color: var(--accent); }
    .upload-area input { display: none; }

    /* ── Chat ── */
    .chat-warn { background: #2a1f2e; border: 1px solid var(--danger); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--danger); margin-bottom: 16px; display: none; }
    .chat-warn a { color: var(--danger); text-decoration: underline; cursor: pointer; }
    #chat-messages { height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding: 4px 0 8px; margin-bottom: 16px; }
    .bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.55; font-size: 14px; }
    .bubble.user  { background: var(--user-bg); align-self: flex-end; border-bottom-right-radius: 3px; }
    .bubble.bot   { background: var(--bot-bg);  align-self: flex-start; border-bottom-left-radius: 3px; border: 1px solid var(--border); }
    .bubble.thinking { color: var(--muted); font-style: italic; }
    .sources-toggle { font-size: 11px; color: var(--accent); cursor: pointer; margin-top: 8px; user-select: none; }
    .sources-toggle:hover { color: var(--accent-h); }
    .sources-list { display: none; margin-top: 8px; font-size: 11px; color: var(--muted); line-height: 1.7; }
    .sources-list.open { display: block; }
    .src-item { display: flex; gap: 6px; }
    .src-score { color: var(--accent); font-weight: 600; min-width: 36px; }
    .chat-input-row { display: flex; gap: 10px; }
    #chat-input { flex: 1; resize: none; height: 44px; padding: 10px 14px; line-height: 1.4; }

    /* ── Empty state ── */
    .empty { text-align: center; color: var(--muted); padding: 24px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Aqua<span>Bot</span> RAG</div>
  <nav>
    <button class="active" onclick="switchTab('settings', this)">⚙️ Settings</button>
    <button onclick="switchTab('documents', this)">📄 Documents</button>
    <button onclick="switchTab('chat', this)">💬 Chat</button>
  </nav>
</header>

<main>

  <!-- ── SETTINGS TAB ── -->
  <div id="tab-settings" class="tab-panel active">
    <div class="card">
      <h2>API Configuration</h2>
      <div class="field">
        <label>Anthropic API Key</label>
        <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" />
      </div>
      <div class="field">
        <label>System Prompt</label>
        <textarea id="system-prompt"></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label>Top K (chunks retrieved)</label>
          <input type="number" id="top-k" min="1" max="10" value="3" />
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- ── DOCUMENTS TAB ── -->
  <div id="tab-documents" class="tab-panel">
    <div class="card">
      <h2>Upload Document</h2>
      <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".txt" onchange="handleFileSelect(event)" />
        <div>📂 Click to choose a <strong>.txt</strong> file — or drag & drop here</div>
        <div id="selected-file" style="margin-top:8px; color: var(--text);"></div>
      </div>
      <button class="btn btn-primary" id="upload-btn" onclick="uploadDoc()" disabled>Upload & Re-index</button>
    </div>

    <div class="card">
      <h2>Current Documents</h2>
      <div class="stat-bar" style="margin-bottom:16px;">
        <div class="stat"><div class="val" id="stat-docs">—</div><div class="lbl">Documents</div></div>
        <div class="stat"><div class="val" id="stat-vectors">—</div><div class="lbl">Vectors</div></div>
      </div>
      <ul class="doc-list" id="doc-list"><li class="empty">Loading...</li></ul>
    </div>
  </div>

  <!-- ── CHAT TAB ── -->
  <div id="tab-chat" class="tab-panel">
    <div class="chat-warn" id="chat-warn">
      ⚠️ API key not set. <a onclick="switchTabByName('settings')">Go to Settings</a> to configure it.
    </div>
    <div class="card" style="padding: 16px;">
      <div id="chat-messages">
        <div class="bubble bot">👋 Hi! Ask me anything about AquaBot. I'll answer using the knowledge base.</div>
      </div>
      <div class="chat-input-row">
        <textarea id="chat-input" placeholder="Ask a question..." onkeydown="handleChatKey(event)"></textarea>
        <button class="btn btn-primary" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
  // ── Tab switching ────────────────────────────────────────────────────────
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
    if (name === 'documents') loadDocuments();
    if (name === 'settings') loadSettings();
    if (name === 'chat') checkApiKey();
  }
  function switchTabByName(name) {
    const btn = [...document.querySelectorAll('nav button')].find(b => b.textContent.toLowerCase().includes(name));
    switchTab(name, btn);
  }

  // ── Toast ────────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3000);
  }

  // ── Settings ─────────────────────────────────────────────────────────────
  async function loadSettings() {
    const res = await fetch('/api/settings');
    const data = await res.json();
    document.getElementById('api-key').value = data.api_key;
    document.getElementById('system-prompt').value = data.system_prompt;
    document.getElementById('top-k').value = data.top_k;
  }

  async function saveSettings() {
    const body = {
      api_key: document.getElementById('api-key').value,
      system_prompt: document.getElementById('system-prompt').value,
      top_k: parseInt(document.getElementById('top-k').value) || 3,
    };
    const res = await fetch('/api/settings', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
    });
    if (res.ok) toast('Settings saved ✓', 'ok');
    else toast('Error saving settings', 'err');
  }

  // ── Documents ────────────────────────────────────────────────────────────
  async function loadDocuments() {
    const [docsRes, healthRes] = await Promise.all([
      fetch('/api/documents'), fetch('/api/health')
    ]);
    const { documents } = await docsRes.json();
    const health = await healthRes.json();

    document.getElementById('stat-docs').textContent = health.doc_count ?? documents.length;
    document.getElementById('stat-vectors').textContent = health.vector_count ?? '—';

    const list = document.getElementById('doc-list');
    if (documents.length === 0) {
      list.innerHTML = '<li class="empty">No documents yet. Upload one above.</li>';
      return;
    }
    list.innerHTML = documents.map(d => `
      <li class="doc-item">
        <span class="doc-icon">📄</span>
        <span class="doc-name">${d.name}</span>
        <span class="doc-size">${formatSize(d.size)}</span>
        <button class="btn btn-danger" onclick="deleteDoc('${d.name}')">✕ Delete</button>
      </li>
    `).join('');
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    return (bytes / 1024).toFixed(1) + ' KB';
  }

  let selectedFile = null;
  function handleFileSelect(e) {
    selectedFile = e.target.files[0];
    document.getElementById('selected-file').textContent = selectedFile ? '📎 ' + selectedFile.name : '';
    document.getElementById('upload-btn').disabled = !selectedFile;
  }

  // Drag & drop
  const uploadArea = document.getElementById('upload-area');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) {
      selectedFile = file;
      document.getElementById('selected-file').textContent = '📎 ' + file.name;
      document.getElementById('upload-btn').disabled = false;
    }
  });

  async function uploadDoc() {
    if (!selectedFile) return;
    const btn = document.getElementById('upload-btn');
    btn.disabled = true;
    btn.textContent = 'Indexing...';
    const form = new FormData();
    form.append('file', selectedFile);
    const res = await fetch('/api/documents/upload', { method: 'POST', body: form });
    const data = await res.json();
    btn.textContent = 'Upload & Re-index';
    if (res.ok) {
      toast(`Uploaded & indexed (${data.chunks_total} vectors) ✓`, 'ok');
      selectedFile = null;
      document.getElementById('selected-file').textContent = '';
      document.getElementById('file-input').value = '';
      loadDocuments();
    } else {
      toast(data.detail || 'Upload failed', 'err');
      btn.disabled = false;
    }
  }

  async function deleteDoc(name) {
    if (!confirm(`Delete "${name}" and re-index?`)) return;
    const res = await fetch(`/api/documents/${encodeURIComponent(name)}`, { method: 'DELETE' });
    const data = await res.json();
    if (res.ok) {
      toast(`Deleted "${name}" ✓`, 'ok');
      loadDocuments();
    } else {
      toast(data.detail || 'Delete failed', 'err');
    }
  }

  // ── Chat ─────────────────────────────────────────────────────────────────
  async function checkApiKey() {
    const res = await fetch('/api/settings');
    const data = await res.json();
    document.getElementById('chat-warn').style.display = data.api_key ? 'none' : 'block';
  }

  function handleChatKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  }

  function appendBubble(role, html, sourcesHtml = '') {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'bubble ' + role;
    div.innerHTML = html;
    if (sourcesHtml) {
      const toggle = document.createElement('div');
      toggle.className = 'sources-toggle';
      toggle.textContent = '▶ Sources';
      const list = document.createElement('div');
      list.className = 'sources-list';
      list.innerHTML = sourcesHtml;
      toggle.onclick = () => {
        list.classList.toggle('open');
        toggle.textContent = list.classList.contains('open') ? '▼ Sources' : '▶ Sources';
      };
      div.appendChild(toggle);
      div.appendChild(list);
    }
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  async function sendChat() {
    const input = document.getElementById('chat-input');
    const query = input.value.trim();
    if (!query) return;
    input.value = '';

    appendBubble('user', escHtml(query));
    const thinking = appendBubble('bot thinking', 'Thinking...');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });
      const data = await res.json();
      thinking.remove();

      if (!res.ok) {
        appendBubble('bot', '⚠️ ' + escHtml(data.detail || 'Error'));
        return;
      }

      const sourcesHtml = (data.sources || []).map(s =>
        `<div class="src-item"><span class="src-score">[${s.similarity.toFixed(2)}]</span><span>${escHtml(s.source)}</span></div>`
      ).join('');

      appendBubble('bot', escHtml(data.answer), sourcesHtml);
    } catch (err) {
      thinking.remove();
      appendBubble('bot', '⚠️ Network error: ' + escHtml(err.message));
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  loadSettings();
</script>
</body>
</html>
